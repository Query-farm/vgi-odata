# Copyright 2026 Query Farm LLC - https://query.farm
#
# Build and publish the multi-arch vgi-odata image to ghcr.io. The heavy lifting
# (multi-arch build -> per-arch /health boot smoke -> image SQL suite -> push ->
# manifest -> cosign-sign) lives in the shared reusable workflow
# Query-farm/vgi-actions; this file gates on the repo's own CI suite and supplies
# the worker-specific inputs.
#
# Tag-driven: vX.Y.Z -> :X.Y.Z/:X.Y/:latest, push to main -> :edge. Publishing a
# GitHub Release creates the tag, which fires this too.
name: Publish image to ghcr.io

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate every image on the full unit + vgi-extension integration suite, so a
  # broken worker is never imaged. ci.yml declares `on: workflow_call`.
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [ci]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: Query-farm/vgi-actions/.github/workflows/docker-publish.yml@v1
    secrets: inherit
    with:
      image_name: vgi-odata
      # Go binary — nothing to `import`, so the language-import smoke is skipped.
      # The reusable workflow still runs its dual-arch HTTP /health boot smoke.
      smoke_import: ""
      health_port: "8000"
      # No ci/check-version.sh in this repo -> version_check_cmd is omitted.
      #
      # Validate the built image's transports against the signed vgi extension.
      # The worker *logic* is already exercised every run by the gating `ci` job
      # (all test/sql/*, three transports, two build steps), so here we only prove
      # the IMAGE's entrypoints speak the protocol end to end:
      #   - stdio: smoke ONE file through `docker run … stdio` (the on-host mode);
      #   - HTTP : the FULL suite against a SINGLE warm container.
      #
      # vgi-odata's table functions ALWAYS make a live HTTP call, so the suite
      # needs the mock OData server. The worker runs INSIDE a container and cannot
      # reach a host-loopback mock, so we run the mock as its OWN container on a
      # shared docker network (`odata-net`) and point the worker at it by the
      # network hostname `odata-mock` (SKIP_MOCK tells run-integration.sh not to
      # spawn its own). The mock's --base-url makes the @odata.nextLink it
      # advertises resolve to that same hostname, so cross-container paging works.
      # $CITEST_IMAGE is the loaded <image>:citest-amd64 ref; GH_TOKEN is provided.
      image_test: |
        set -e
        echo "::group::download haybarn-unittest"
        REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
        gh release download "$REL" --repo Query-farm-haybarn/haybarn \
          --pattern 'haybarn_unittest-linux-amd64.zip' --output hb.zip --clobber
        mkdir -p hb && unzip -o -q hb.zip -d hb
        export HAYBARN_UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
        chmod +x "$HAYBARN_UNITTEST"
        echo "::endgroup::"

        echo "::group::start mock OData server (container on a shared docker network)"
        docker network create odata-net >/dev/null 2>&1 || true
        docker rm -f odata-mock >/dev/null 2>&1 || true
        docker run -d --name odata-mock --network odata-net -p 18080:8000 \
          -e MOCK_BASE_URL=http://odata-mock:8000 "$CITEST_IMAGE" mock
        trap 'docker rm -f odata-mock >/dev/null 2>&1 || true; docker network rm odata-net >/dev/null 2>&1 || true' EXIT
        for _ in $(seq 1 30); do curl -fsS -o /dev/null http://localhost:18080/ && break; sleep 1; done
        # The worker (a container on odata-net) reaches the mock by its network name.
        export VGI_ODATA_TEST_URL="http://odata-mock:8000"
        echo "::endgroup::"

        echo "::group::stdio entrypoint smoke (one file, cold container per ATTACH)"
        TRANSPORT=subprocess SKIP_MOCK=1 \
          TEST_PATTERN="test/sql/odata_query.test" \
          VGI_ODATA_WORKER="docker run -i --rm --network odata-net $CITEST_IMAGE stdio" \
          ci/run-integration.sh
        echo "::endgroup::"

        echo "::group::full SQL suite — HTTP transport (one warm container)"
        CID=$(docker run -d --network odata-net -p 18000:8000 "$CITEST_IMAGE")
        trap 'docker rm -f "$CID" odata-mock >/dev/null 2>&1 || true; docker network rm odata-net >/dev/null 2>&1 || true' EXIT
        for _ in $(seq 1 30); do curl -fsS -o /dev/null http://localhost:18000/health && break; sleep 1; done
        TRANSPORT=http SKIP_MOCK=1 VGI_ODATA_WORKER="http://localhost:18000" ci/run-integration.sh
        echo "::endgroup::"
